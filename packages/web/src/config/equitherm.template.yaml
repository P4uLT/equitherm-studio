# Generated by Equitherm Calculator
# {{date}}
#
# ESPHome equitherm climate component configuration
# Docs: https://esphome.io/components/climate/equitherm.html

climate:
  - platform: equitherm
    id: heating_controller
    name: "Equitherm Climate"

    # Required sensors
    outdoor_sensor: outdoor_sensor
    indoor_sensor: indoor_sensor
    default_target_temperature: {{t}}

    # Output configuration
    heat_output: heat_output
    fallback_outdoor_temp: 0.0
{{#controlParams}}
    # Heating curve + PID parameters
    control_parameters:
      hc: {{hc}}
      n: {{n}}{{#shift}}
      shift: {{shift}}{{/shift}}{{#kp}}
      kp: {{kp}}{{/kp}}{{#ki}}
      ki: {{ki}}{{/ki}}{{#kd}}
      kd: {{kd}}{{/kd}}
{{/controlParams}}
{{#outputParams}}
    # Output behavior
    output_parameters:
      min_flow_temp: {{minFlow}}
      max_flow_temp: {{maxFlow}}{{#deadbandParams}}
    deadband_parameters:
      threshold_high: {{thresholdHigh}}
      threshold_low: {{thresholdLow}}{{#kpMultiplier}}
      kp_multiplier: {{kpMultiplier}}{{/kpMultiplier}}{{#kiMultiplier}}
      ki_multiplier: {{kiMultiplier}}{{/kiMultiplier}}{{#kdMultiplier}}
      kd_multiplier: {{kdMultiplier}}{{/kdMultiplier}}
{{/deadbandParams}}
{{/outputParams}}
{{#includeSensors}}

# Diagnostic sensors
sensor:
  - platform: equitherm
    climate_id: heating_controller
    type: curve_output_raw
    name: "Curve Output Raw"
  - platform: equitherm
    climate_id: heating_controller
    type: final_flow_setpoint
    name: "Final Flow Setpoint"
  {{#pid}}
  - platform: equitherm
    climate_id: heating_controller
    type: pid_correction
    name: "PID Correction"{{/pid}}

binary_sensor:
  - platform: equitherm
    climate_id: heating_controller
    outdoor_fallback_active:
      name: "Outdoor Sensor Fallback"
    rate_limiting_active:
      name: "Rate Limiting Active"

text_sensor:
  - platform: equitherm
    climate_id: heating_controller
    control_mode:
      name: "Control Mode"
{{/includeSensors}}
{{#includeNumbers}}

# Runtime tuning
number:
  - platform: equitherm
    climate_id: heating_controller
    heat_curve_coefficient:
      name: "Heating Curve Coefficient"
  - platform: equitherm
    climate_id: heating_controller
    heat_curve_exponent:
      name: "Heating Curve Exponent"{{#hasShift}}
  - platform: equitherm
    climate_id: heating_controller
    heat_curve_shift:
      name: "Heating Curve Shift"{{/hasShift}}{{#pid}}
  - platform: equitherm
    climate_id: heating_controller
    pid_proportional_gain:
      name: "PID Proportional Gain"
  - platform: equitherm
    climate_id: heating_controller
    pid_integral_gain:
      name: "PID Integral Gain"
  - platform: equitherm
    climate_id: heating_controller
    pid_derivative_gain:
      name: "PID Derivative Gain"{{/pid}}
{{/includeNumbers}}
