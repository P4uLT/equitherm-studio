name: Preview

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_BASE_PATH: /equitherm-studio/pr-preview/pr-${{ github.event.workflow_run.pull_requests[0].number }}/

      - name: Copy 404.html for SPA routing
        run: cp packages/web/public/404.html packages/web/dist/app/404.html

      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          source-dir: packages/web/dist/app
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
          wait-for-pages-deployment: true
          qr-code: false
          pr-number: ${{ github.event.workflow_run.pull_requests[0].number }}
