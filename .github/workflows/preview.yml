name: Preview

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_BASE_PATH: /equitherm-studio/pr-preview/pr-${{ github.event.number }}/

      - name: Copy 404.html for SPA routing
        run: cp packages/web/public/404.html packages/web/dist/app/404.html

      - name: Deploy PR Preview
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: packages/web/dist/app
          target-folder: pr-preview/pr-${{ github.event.number }}
          clean: true

      - name: Comment Preview URL
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const { number } = context.issue;
            const previewUrl = `https://p4ult.github.io/equitherm-studio/pr-preview/pr-${number}/`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body: `🚀 Preview deployed: ${previewUrl}`
            });
